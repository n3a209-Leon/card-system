.splash{position:fixed;inset:0;z-index:100;background:#000;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;}
.splash-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transform:scale(1.18);opacity:1;transition:transform 1.6s cubic-bezier(.16,.8,.3,1), opacity 1.1s ease .5s;}
.splash.zoomout .splash-img{transform:scale(1);}

  opacity:0;transform:translateY(10px);transition:opacity .8s ease .5s, transform .8s ease .5s;}

.splash-brand .tag{font-size:12px;color:var(--ink-dim);margin-top:8px;letter-spacing:.08em;}

.gsi-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;color:#3c4043;border-radius:12px;padding:13px;font-size:15px;font-weight:600;
  border:1px solid var(--line);cursor:pointer;font-family:inherit;
  transition:transform .08s ease, opacity .08s ease;}

<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef} = React;
const APP_VERSION = '2.0';

/* ============ CATEGORIES ============ */
const CATEGORIES = [
  {id:'fuel', name:'加油', icon:'⛽', color:'#4f8ef7'},
  {id:'maintenance', name:'保養', icon:'🔧', color:'#e8a33d'},
  {id:'repair', name:'維修', icon:'🛠️', color:'#e2574c'},
  {id:'insurance', name:'保險', icon:'🛡️', color:'#8b6ff7'},
  {id:'tax_license', name:'牌照稅', icon:'📋', color:'#4fc3f7'},
  {id:'tax_fuel', name:'燃料稅', icon:'🧾', color:'#3ecf8e'},
  {id:'inspection', name:'驗車', icon:'✅', color:'#8bc34a'},
  {id:'tire', name:'調胎/輪胎', icon:'🛞', color:'#a1785a'},
  {id:'carwash', name:'洗車鍍膜', icon:'🚿', color:'#03a9f4'},
  {id:'etag', name:'etag儲值', icon:'💳', color:'#ff9800'},
  {id:'accessory', name:'配件雜項', icon:'🧩', color:'#c07ae0'},
  {id:'other', name:'其他', icon:'📌', color:'#8b96a5'},
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

/* ============ FIREBASE ============ */
// 沿用 Venus OS 同一個 Firebase 專案 (attendance-pwa-9fa73)。
// 請把下面 firebaseConfig 換成你 fresh2.html 裡實際使用的那一組設定值。
const firebaseConfig = {
  apiKey: "AIzaSyAqgA9pYvOduWypEE5kxVNlq9fEfrEMV0c",
  authDomain: "attendance-pwa-9fa73.firebaseapp.com",
  projectId: "attendance-pwa-9fa73",
  storageBucket: "attendance-pwa-9fa73.firebasestorage.app",
  messagingSenderId: "231697999145",
  appId: "1:231697999145:web:b92cba42082eb9cc574338"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
try{ auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }catch(e){}

async function gSignIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  try{
    return await auth.signInWithPopup(provider);
  }catch(e){
    if(e.code==='auth/popup-blocked' || e.code==='auth/popup-closed-by-user'){
      return auth.signInWithRedirect(provider);
    }
    throw e;
  }
}

/* ============ STORAGE HELPERS ============ */
// 目前登入使用者的 UID，資料分區用。登入後由 onAuthStateChanged 設定。
let ACTIVE_UID = null;
function setActiveUid(u){ ACTIVE_UID = u || null; }
function uidTag(){ return ACTIVE_UID ? ACTIVE_UID : 'anon'; }

// localStorage 一律加上 UID 前綴，避免不同 Google 帳號在同一支手機共用同一份資料。
function nsKey(key){ return 'moko:'+uidTag()+':'+key; }
function safeGet(key){ try{ return localStorage.getItem(nsKey(key)); }catch(e){ return null; } }
function safeSet(key,val){ try{ localStorage.setItem(nsKey(key),val); return true; }catch(e){ return false; } }

// 資料庫版本升到 3。為了徹底避開「同一 store 換 keyPath」的相容性風險，
// 新資料改用全新的 store 名稱（records2/issues2/meta2），舊 store 保留唯讀，
// 由 migrateLegacyRows() 在登入後把舊資料搬進新 store 並掛到目前 UID。
const DB_NAME='moko-ledger', DB_VER=3;
const S_REC='records2', S_ISS='issues2', S_META='meta2', S_OUT='outbox';

function openDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e)=>{
      const idb = e.target.result;
      if(!idb.objectStoreNames.contains(S_REC)) idb.createObjectStore(S_REC,{keyPath:'_pk'});
      if(!idb.objectStoreNames.contains(S_ISS)) idb.createObjectStore(S_ISS,{keyPath:'_pk'});
      if(!idb.objectStoreNames.contains(S_META)) idb.createObjectStore(S_META,{keyPath:'_pk'});
      if(!idb.objectStoreNames.contains(S_OUT)) idb.createObjectStore(S_OUT,{keyPath:'opId'});
      // 舊 store（records/issues/meta）不動，保留給 migrateLegacyRows 讀取。
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}

// 讀舊 store 全部內容（若存在），回傳陣列；不存在則回空陣列。
async function readOldStore(name){
  try{
    const idb = await openDB();
    if(!idb.objectStoreNames.contains(name)) return [];
    return await new Promise((resolve,reject)=>{
      const tx = idb.transaction(name,'readonly');
      const r = tx.objectStore(name).getAll();
      r.onsuccess = ()=>resolve(r.result||[]);
      r.onerror = ()=>reject(r.error);
    });
  }catch(e){ return []; }
}

// 把舊 store 的資料搬進新 store、掛到目前 UID，搬完標記避免重複搬。
async function migrateLegacyRows(){
  const doneKey = 'moko:migrated:'+uidTag();
  if(safeGetRaw(doneKey)) return;
  const oldRecords = await readOldStore('records');
  const oldIssues = await readOldStore('issues');
  const oldMeta = await readOldStore('meta');
  if(oldRecords.length || oldIssues.length || oldMeta.length){
    for(const r of oldRecords){ const {_pk, ...rest}=r; if(rest.id) await idbPut(S_REC, rest); }
    for(const i of oldIssues){ const {_pk, ...rest}=i; if(rest.id) await idbPut(S_ISS, rest); }
    const mm = oldMeta.find(x=>x.key==='main') || oldMeta[0];
    if(mm){ const {_pk, ...rest}=mm; await idbPut(S_META, rest.key? rest : {key:'main', ...rest}); }
  }
  safeSetRaw(doneKey, '1');
}
// 不加 UID 前綴的原始 localStorage 存取（給遷移標記用）。
function safeGetRaw(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeSetRaw(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ return false; } }
// 每筆資料存進 IDB 時，_pk 加上 UID 前綴做分區；讀取時只取屬於目前 UID 的。
function pkOf(id){ return uidTag()+'::'+id; }
function isMyPk(pk){ return typeof pk==='string' && pk.indexOf(uidTag()+'::')===0; }
// 把呼叫端使用的友善名稱對應到實際的版本化 store 名稱。
function storeName(s){ return s==='records'? S_REC : s==='issues'? S_ISS : s==='meta'? S_META : s; }

async function idbGetAll(store){
  try{
    const idb = await openDB();
    const st = storeName(store);
    const all = await new Promise((resolve,reject)=>{
      const tx = idb.transaction(st,'readonly');
      const r = tx.objectStore(st).getAll();
      r.onsuccess = ()=>resolve(r.result||[]);
      r.onerror = ()=>reject(r.error);
    });
    // 只回傳屬於目前登入 UID 的資料，把內部欄位 _pk 濾掉再交出去。
    return all.filter(x=>isMyPk(x._pk)).map(x=>{ const {_pk, ...rest}=x; return rest; });
  }catch(e){ return []; }
}
// 回傳 true/false 表示是否真的寫入成功，讓呼叫端能據此顯示錯誤、允許重試。
async function idbPut(store,obj){
  try{
    const idb = await openDB();
    const st = storeName(store);
    const row = {...obj, _pk: pkOf(obj.id!=null? obj.id : (obj.key!=null? obj.key : 'main'))};
    await new Promise((resolve,reject)=>{
      const tx = idb.transaction(st,'readwrite');
      tx.objectStore(st).put(row);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
      tx.onabort = ()=>reject(tx.error||new Error('aborted'));
    });
    return true;
  }catch(e){ console.error('idbPut failed', store, e); return false; }
}

/* ---- Outbox：離線待同步佇列 ---- */
async function outboxAdd(kind, obj){
  try{
    const idb = await openDB();
    const op = { opId: uidTag()+'::'+kind+'::'+(obj.id||obj.key||'meta')+'::'+Date.now()+Math.random().toString(36).slice(2,6),
                 uid: uidTag(), kind, obj, ts: Date.now() };
    await new Promise((resolve,reject)=>{
      const tx = idb.transaction('outbox','readwrite');
      tx.objectStore('outbox').put(op);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
    return true;
  }catch(e){ console.error('outboxAdd failed', e); return false; }
}
async function outboxGetMine(){

function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
// 用本地時區算「今天」，避免台灣凌晨 00:00–07:59 被 UTC 判成前一天。
function todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtNum(n){ if(n==null||isNaN(n)) return '—'; return Math.round(n).toLocaleString('en-US'); }
function fmtDateShort(d){ if(!d) return ''; const p=d.split('-'); return p.length===3? `${p[1]}/${p[2]}` : d; }
function byDateDesc(a,b){ return (b.date||'').localeCompare(a.date||'') || (b.updatedAt||0)-(a.updatedAt||0); }
function groupByMonth(list){ const g={}; list.forEach(r=>{ const k=(r.date||'').slice(0,7)||'未知'; (g[k]=g[k]||[]).push(r); }); return g; }
function mergeByUpdatedAt(localArr, remoteArr){
  const map = new Map();
  (localArr||[]).forEach(x=>map.set(x.id,x));
  (remoteArr||[]).forEach(x=>{
    const cur = map.get(x.id);
    if(!cur || (x.updatedAt||0) >= (cur.updatedAt||0)) map.set(x.id,x);
  });
  return Array.from(map.values());
}
function addMonths(dateStr, months){
  if(!dateStr) return null;
  const d = new Date(dateStr+'T00:00:00');
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}
function daysBetween(d1,d2){ return Math.round((new Date(d2+'T00:00:00') - new Date(d1+'T00:00:00'))/86400000); }

/* ============ REMINDER LOGIC ============ */
function computeReminder(name, icon, {lastDate, intervalMonths, lastMileage, intervalKm, currentMileage}){
  const today = todayStr();
  const dueDate = (lastDate && intervalMonths) ? addMonths(lastDate, intervalMonths) : null;
  const dueKm = (lastMileage!=null && intervalKm!=null) ? lastMileage + intervalKm : null;
  const daysLeft = dueDate!=null ? daysBetween(today, dueDate) : null;
  const kmLeft = (dueKm!=null && currentMileage!=null) ? dueKm - currentMileage : null;
  const urgencyOf = (d,k)=>{
    const dU = d!=null ? (d<=14?'urgent':d<=45?'soon':'ok') : 'ok';
    const kU = k!=null ? (k<=500?'urgent':k<=1500?'soon':'ok') : 'ok';
    const order={urgent:2,soon:1,ok:0};
    return order[dU]>=order[kU]? dU : kU;
  };
  return {name, icon, daysLeft, kmLeft, urgency: urgencyOf(daysLeft,kmLeft)};
}
function fmtReminder(daysLeft, kmLeft){
  const parts=[];
  if(daysLeft!=null) parts.push(daysLeft<0? `逾期${-daysLeft}天` : `${daysLeft}天後`);
  if(kmLeft!=null) parts.push(kmLeft<0? `已超${fmtNum(-kmLeft)}km` : `${fmtNum(kmLeft)}km後`);
  return parts.length? parts.join(' / ') : '—';
}
function buildReminders(meta){
  const r = meta.reminders, cm = meta.currentMileage;
  const list = [
    computeReminder('牌照稅','📋', {lastDate:r.licenseTax.lastDate, intervalMonths:r.licenseTax.intervalMonths}),
    computeReminder('燃料稅','🧾', {lastDate:r.fuelTax.lastDate, intervalMonths:r.fuelTax.intervalMonths}),
    computeReminder('驗車','✅', {lastDate:r.inspection.lastDate, intervalMonths:r.inspection.intervalMonths}),
    computeReminder('保養','🔧', {lastDate:r.maintenance.lastDate, intervalMonths:r.maintenance.intervalMonths, lastMileage:r.maintenance.lastMileage, intervalKm:r.maintenance.intervalKm, currentMileage:cm}),
    computeReminder('調胎','🛞', {lastMileage:r.tireRotation.lastMileage, intervalKm:r.tireRotation.intervalKm, currentMileage:cm}),
  ];
  const order={urgent:0,soon:1,ok:2};
  return list.sort((a,b)=>order[a.urgency]-order[b.urgency]);
}
function applyRecordToMeta(meta, rec){
  let changed = false;
  const R = {...meta.reminders};
  let currentMileage = meta.currentMileage;
  if(rec.mileage!=null && rec.mileage > (currentMileage||0)){ currentMileage = rec.mileage; changed = true; }
  if(rec.category==='tax_license'){ R.licenseTax = {...R.licenseTax, lastDate: rec.date}; changed = true; }
  if(rec.category==='tax_fuel'){ R.fuelTax = {...R.fuelTax, lastDate: rec.date}; changed = true; }
  if(rec.category==='inspection'){ R.inspection = {...R.inspection, lastDate: rec.date}; changed = true; }
  if(rec.category==='maintenance'){ R.maintenance = {...R.maintenance, lastDate: rec.date, lastMileage: rec.mileage!=null? rec.mileage : R.maintenance.lastMileage}; changed = true; }
  if(rec.category==='tire'){ R.tireRotation = {...R.tireRotation, lastDate: rec.date, lastMileage: rec.mileage!=null? rec.mileage : R.tireRotation.lastMileage}; changed = true; }
  if(!changed) return meta;
  return {...meta, currentMileage, reminders:R, updatedAt: Date.now()};
}

// 匯入整批紀錄時用：掃描全部紀錄，找出每個提醒類別「日期最新」的一筆，
// 用它校正提醒設定，而不是只看匯入順序中隨便一筆。單筆新增用 applyRecordToMeta 就好，
// 這個函式只在匯入(JSON 檔案/貼上)流程呼叫。
function deriveMetaFromRecords(records, baseMeta){
  const m = {...baseMeta, reminders: {...baseMeta.reminders}};
  const valid = records.filter(r=>!r.deleted);
  function latestOf(cat){
    return valid.filter(r=>r.category===cat && r.date)
      .sort((a,b)=>b.date.localeCompare(a.date))[0];
  }
  const lt = latestOf('tax_license');
  if(lt) m.reminders.licenseTax = {...m.reminders.licenseTax, lastDate: lt.date};
  const ft = latestOf('tax_fuel');
  if(ft) m.reminders.fuelTax = {...m.reminders.fuelTax, lastDate: ft.date};
  const insp = latestOf('inspection');
  if(insp) m.reminders.inspection = {...m.reminders.inspection, lastDate: insp.date};
  const maint = latestOf('maintenance');
  if(maint) m.reminders.maintenance = {...m.reminders.maintenance, lastDate: maint.date,
    lastMileage: maint.mileage!=null? maint.mileage : m.reminders.maintenance.lastMileage};
  const tire = latestOf('tire');
  if(tire) m.reminders.tireRotation = {...m.reminders.tireRotation, lastDate: tire.date,
    lastMileage: tire.mileage!=null? tire.mileage : m.reminders.tireRotation.lastMileage};
  const maxMileage = valid.reduce((mx,r)=> (r.mileage!=null && r.mileage>mx)? r.mileage : mx, m.currentMileage||0);
  m.currentMileage = maxMileage;
  m.updatedAt = Date.now();
  return m;
}

  // 匯入前驗證：確認結構合法、逐筆檢查必要欄位，回傳清理後的資料與略過筆數。
  // 結構不合法直接丟錯，避免損壞檔案卻顯示「匯入完成」。
  function validateImport(data){
    if(!data || typeof data!=='object') throw new Error('檔案不是有效的 JSON 物件');
    if(!Array.isArray(data.records) && !Array.isArray(data.issues)) throw new Error('檔案缺少 records 或 issues 欄位');
    const validCats = CATEGORIES.map(c=>c.id);
    const goodRecords = [], badRecords = [];
    (data.records||[]).forEach(r=>{
      const dateOk = typeof r.date==='string' && /^\d{4}-\d{2}-\d{2}$/.test(r.date);
      const catOk = validCats.indexOf(r.category)>=0;
      const amtOk = r.amount==null || (typeof r.amount==='number' && !isNaN(r.amount));
      if(dateOk && catOk && amtOk) goodRecords.push(r); else badRecords.push(r);
    });
    const goodIssues = [], badIssues = [];
    (data.issues||[]).forEach(i=>{
      if(i && typeof i.title==='string' && i.title.trim()) goodIssues.push(i); else badIssues.push(i);
    });
    return {
      cleaned: {records: goodRecords, issues: goodIssues, meta: data.meta},
      goodR: goodRecords.length, goodI: goodIssues.length,
      badR: badRecords.length, badI: badIssues.length
    };
  }
  function handleFile(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    setImportBusy(true); setImportMsg('');
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const data = JSON.parse(reader.result);
        const v = validateImport(data);
        await onImport(v.cleaned);
        let msg = `匯入完成：${v.goodR} 筆紀錄、${v.goodI} 筆事件`;
        if(v.badR||v.badI) msg += `（已略過格式錯誤 ${v.badR} 筆紀錄、${v.badI} 筆事件）`;
        setImportMsg(msg);
      }catch(err){
        setImportMsg('匯入失敗：'+(err.message||'檔案格式錯誤'));
      }
      setImportBusy(false);
      if(fileRef.current) fileRef.current.value='';
    };
    reader.readAsText(file);
  }
  async function handlePasteImport(){
    if(!pasteText.trim()){ setImportMsg('請先貼上 JSON 內容'); return; }
    setPasteBusy(true); setImportMsg('');
    try{
      const data = JSON.parse(pasteText);
      const v = validateImport(data);
      await onImport(v.cleaned);
      let msg = `匯入完成：${v.goodR} 筆紀錄、${v.goodI} 筆事件`;
      if(v.badR||v.badI) msg += `（已略過格式錯誤 ${v.badR} 筆紀錄、${v.badI} 筆事件）`;
      setImportMsg(msg);
      setPasteText('');
    }catch(err){
      setImportMsg('匯入失敗：'+(err.message||'JSON 格式錯誤，請確認完整複製貼上'));
    }
    setPasteBusy(false);
  }
  return <div>
    <div className="section-title">車輛資訊</div>
    <div className="field"><label>目前里程 (km)</label>
      <input type="number" value={m.currentMileage} onChange={e=>setM({...m,currentMileage:+e.target.value})}/></div>
    <div className="field"><label>初始里程 (km)</label>
      <input type="number" value={m.initialMileage} onChange={e=>setM({...m,initialMileage:+e.target.value})}/></div>
    <div className="field"><label>購車日期</label>
      <input type="date" value={m.purchaseDate} onChange={e=>setM({...m,purchaseDate:e.target.value})}/></div>

    <div className="section-title">提醒週期設定（日期＋間隔月數）</div>
    <IntervalField label="牌照稅" unit="月" dateValue={m.reminders.licenseTax.lastDate} value={m.reminders.licenseTax.intervalMonths}
      onDateChange={v=>setR('licenseTax',{lastDate:v})} onChange={v=>setR('licenseTax',{intervalMonths:v})}/>
    <IntervalField label="燃料稅" unit="月" dateValue={m.reminders.fuelTax.lastDate} value={m.reminders.fuelTax.intervalMonths}
      onDateChange={v=>setR('fuelTax',{lastDate:v})} onChange={v=>setR('fuelTax',{intervalMonths:v})}/>
    <IntervalField label="驗車" unit="月" dateValue={m.reminders.inspection.lastDate} value={m.reminders.inspection.intervalMonths}
      onDateChange={v=>setR('inspection',{lastDate:v})} onChange={v=>setR('inspection',{intervalMonths:v})}/>
    <IntervalField label="保養" unit="月" dateValue={m.reminders.maintenance.lastDate} value={m.reminders.maintenance.intervalMonths}
      onDateChange={v=>setR('maintenance',{lastDate:v})} onChange={v=>setR('maintenance',{intervalMonths:v})}
      kmValue={m.reminders.maintenance.intervalKm} onKmChange={v=>setR('maintenance',{intervalKm:v})}/>
    <div className="field"><label>調胎 上次里程 / 間隔 km</label>
      <div style={{display:'flex',gap:8}}>
        <input type="number" style={{flex:1}} value={m.reminders.tireRotation.lastMileage} onChange={e=>setR('tireRotation',{lastMileage:+e.target.value})}/>
        <input type="number" style={{flex:1}} value={m.reminders.tireRotation.intervalKm} onChange={e=>setR('tireRotation',{intervalKm:+e.target.value})}/>
      </div>
    </div>

    <button className="btn btn-primary" style={{width:'100%',marginTop:6}} onClick={()=>onSaveMeta(m)}>儲存設定</button>

    <div className="section-title">資料備份</div>
    <button className="btn btn-ghost" style={{width:'100%'}} onClick={exportData}>匯出 JSON 備份</button>

    <div className="section-title">匯入資料</div>
    <input ref={fileRef} type="file" accept="application/json" style={{display:'none'}} onChange={handleFile}/>
    <button className="btn btn-ghost" style={{width:'100%'}} disabled={importBusy} onClick={()=>fileRef.current&&fileRef.current.click()}>
      {importBusy? '匯入中…' : '匯入 JSON 檔案'}
    </button>

    <div className="field" style={{marginTop:14}}>
      <label>或直接貼上 JSON 內容</label>
      <textarea style={{minHeight:110,fontFamily:'var(--mono)',fontSize:12.5}} value={pasteText}
        onChange={e=>setPasteText(e.target.value)} placeholder='{"records":[...],"issues":[...]}'/>
    </div>
    <button className="btn btn-ghost" style={{width:'100%'}} disabled={pasteBusy} onClick={handlePasteImport}>
      {pasteBusy? '匯入中…' : '貼上並匯入'}
    </button>
    {importMsg && <div style={{fontSize:12,color:'var(--ink-dim)',marginTop:8,textAlign:'center'}}>{importMsg}</div>}

    <div className="section-title">帳號</div>
    <button className="btn btn-danger" style={{width:'100%'}} onClick={onLogout}>登出</button>

    <div style={{textAlign:'center',fontSize:11,color:'var(--ink-dim)',marginTop:24,opacity:.6}}>
      墨哥 OS · 版本 {APP_VERSION}
    </div>
  </div>;
}

/* ============ APP ============ */
function App(){
  const [user,setUser] = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [records,setRecords] = useState([]);
  const [issues,setIssues] = useState([]);
  const [meta,setMeta] = useState(DEFAULT_META);
  const [tab,setTab] = useState('dashboard');
  const [online,setOnline] = useState(navigator.onLine);
  const [syncState,setSyncState] = useState('ok');
  const [splashPhase,setSplashPhase] = useState('');
  const [showSplash,setShowSplash] = useState(true);

  const [showAdd,setShowAdd] = useState(false);
  const [editingRecord,setEditingRecord] = useState(null);
  const [addPrefill,setAddPrefill] = useState(null);
  const [showIssueAdd,setShowIssueAdd] = useState(false);
  const [followupTarget,setFollowupTarget] = useState(null);

  useEffect(()=>{
    const t1 = setTimeout(()=>setSplashPhase('zoomout'), 60);
    const t2 = setTimeout(()=>setSplashPhase('zoomout fadeout'), 1700);
    const t3 = setTimeout(()=>setShowSplash(false), 2300);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  },[]);

  useEffect(()=>{
    auth.getRedirectResult().catch(e=>console.error('redirect result error',e));
  },[]);

  const [pendingCount,setPendingCount] = useState(0);

  useEffect(()=>{
    const onOnline=()=>{ setOnline(true); if(user){ flushOutbox().then(()=>pullFirestore(user.uid)); } };
    const onOffline=()=>setOnline(false);
    window.addEventListener('online',onOnline);
    window.addEventListener('offline',onOffline);
    return ()=>{ window.removeEventListener('online',onOnline); window.removeEventListener('offline',onOffline); };
  },[user]);

  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async (u)=>{
      // 先設定目前 UID，之後所有 IDB / localStorage 讀寫才會鎖定在這個帳號的分區。
      setActiveUid(u ? u.uid : null);
      setUser(u);
      setAuthLoading(false);
      if(u){
        await loadAll(u.uid);
        await flushOutbox();
      } else {
        // 登出時清空畫面上的記憶體資料，避免殘留給下一個登入的帳號看到。
        setRecords([]); setIssues([]); setMeta(DEFAULT_META);
      }
    });
    return unsub;
  },[]);

  async function refreshPendingCount(){
    const ops = await outboxGetMine();
    setPendingCount(ops.length);
  }

  async function loadAll(uidVal){
    setSyncState('syncing');
    try{
      await migrateLegacyRows(); // 舊版資料搬遷到目前 UID（只有第一次升級後有效）
      let localRecords = await idbGetAll('records');
      let localIssues = await idbGetAll('issues');
      let metaRows = await idbGetAll('meta');
      let localMeta = metaRows.find(x=>x.key==='main');
      // 備援：若 IDB 尚無 meta，讀 UID 分區後的 localStorage。
      if(!localMeta){
        const raw = safeGet('meta');
        if(raw){ try{ localMeta = JSON.parse(raw); }catch(e){} }
      }
      if(!localMeta) localMeta = DEFAULT_META;
      if((!localRecords || localRecords.length===0)){
        const raw = safeGet('records');
        if(raw){ try{ localRecords = JSON.parse(raw); }catch(e){ localRecords=[]; } }
      }
      if((!localIssues || localIssues.length===0)){
        const raw = safeGet('issues');
        if(raw){ try{ localIssues = JSON.parse(raw); }catch(e){ localIssues=[]; } }
      }
      setRecords((localRecords||[]).slice().sort(byDateDesc));
      setIssues((localIssues||[]).slice().sort(byDateDesc));
      setMeta(localMeta);
      await refreshPendingCount();
      if(navigator.onLine) await pullFirestore(uidVal, localRecords, localIssues, localMeta);
      else setSyncState('off');
    }catch(e){
      console.error(e); setSyncState('error');
    }
  }

  // 資料表路徑沿用 Venus OS 已經在用、且已知有正確權限規則的
  // users/{uid}/data/{key} 子集合（{value:...} 包裝），
  // 避免因為開一個全新的 car-expense collection 而被 Firestore 安全規則擋下寫入。
  function dataCol(uu){ return db.collection('users').doc(uu).collection('data'); }
  const KEY_RECORD_PREFIX = 'car:record:';
  const KEY_ISSUE_PREFIX = 'car:issue:';
  const KEY_META = 'car:meta';

  async function pullFirestore(uidVal, curRecords, curIssues, curMeta){
    try{
      const uu = uidVal || (auth.currentUser && auth.currentUser.uid);
      if(!uu) return;
      curRecords = curRecords || records;
      curIssues = curIssues || issues;
      curMeta = curMeta || meta;

      const col = dataCol(uu);
      const recSnap = await col
        .where(firebase.firestore.FieldPath.documentId(), '>=', KEY_RECORD_PREFIX)
        .where(firebase.firestore.FieldPath.documentId(), '<', KEY_RECORD_PREFIX+'\uf8ff')
        .get();
      const remoteRecords = recSnap.docs.map(d=>d.data().value).filter(Boolean);

      const issueSnap = await col
        .where(firebase.firestore.FieldPath.documentId(), '>=', KEY_ISSUE_PREFIX)
        .where(firebase.firestore.FieldPath.documentId(), '<', KEY_ISSUE_PREFIX+'\uf8ff')
        .get();
      const remoteIssues = issueSnap.docs.map(d=>d.data().value).filter(Boolean);

      const metaDoc = await col.doc(KEY_META).get();
      const remoteMeta = (metaDoc.exists && metaDoc.data().value) ? metaDoc.data().value : null;

      const mergedRecords = mergeByUpdatedAt(curRecords, remoteRecords);
      const mergedIssues = mergeByUpdatedAt(curIssues, remoteIssues);
      const mergedMeta = (remoteMeta && (remoteMeta.updatedAt||0) > (curMeta.updatedAt||0)) ? remoteMeta : curMeta;

      for(const r of mergedRecords) await idbPut('records', r);
      for(const i of mergedIssues) await idbPut('issues', i);
      await idbPut('meta', {key:'main', ...mergedMeta});
      safeSet('records', JSON.stringify(mergedRecords));
      safeSet('issues', JSON.stringify(mergedIssues));
      safeSet('meta', JSON.stringify(mergedMeta));

      setRecords(mergedRecords.slice().sort(byDateDesc));
      setIssues(mergedIssues.slice().sort(byDateDesc));
      setMeta(mergedMeta);
      setSyncState('ok');

      // 一次性搬遷：如果雲端這個新路徑是空的、但本機已經有資料
      // （例如剛從舊的 car-expense 路徑換過來），自動把本機資料補寫上去，
      // 不用使用者一筆一筆重新編輯才能觸發同步。
      if(recSnap.empty && mergedRecords.length>0){
        for(const r of mergedRecords) await pushToFirestore('record', r);
      }
      if(issueSnap.empty && mergedIssues.length>0){
        for(const i of mergedIssues) await pushToFirestore('issue', i);
      }
      if(!metaDoc.exists){
        await pushToFirestore('meta', mergedMeta);
      }
    }catch(e){
      console.error('pull failed', e); setSyncState('error');
    }
  }

  async function persistRecordsLocal(){
    const all = await idbGetAll('records');
    safeSet('records', JSON.stringify(all));
  }
  async function persistIssuesLocal(){
    const all = await idbGetAll('issues');
    safeSet('issues', JSON.stringify(all));
  }

  // Outbox：把佇列裡屬於目前 UID 的待同步操作依序送出，成功一筆刪一筆。
  async function flushOutbox(){
    if(!navigator.onLine) return;
    const uu = auth.currentUser && auth.currentUser.uid;
    if(!uu) return;
    const ops = await outboxGetMine();
    if(ops.length===0){ setPendingCount(0); return; }
    setSyncState('syncing');
    ops.sort((a,b)=>a.ts-b.ts);
    for(const op of ops){
      const ok = await pushToFirestoreRaw(op.kind, op.obj);
      if(ok) await outboxRemove(op.opId);
      else break; // 一旦失敗就停，等下次上線再繼續，維持順序
    }
    await refreshPendingCount();
    const remaining = await outboxGetMine();
    setSyncState(remaining.length? 'error' : 'ok');
  }

  // 實際寫入 Firestore，回傳成功與否，不碰 UI 狀態、不排隊。給 flushOutbox 和 wrapper 共用。
  async function pushToFirestoreRaw(kind, obj){
    try{
      const uu = auth.currentUser && auth.currentUser.uid;
      if(!uu) return false;
      const col = dataCol(uu);
      if(kind==='record') await col.doc(KEY_RECORD_PREFIX+obj.id).set({value: obj});
      else if(kind==='issue') await col.doc(KEY_ISSUE_PREFIX+obj.id).set({value: obj});
      else if(kind==='meta') await col.doc(KEY_META).set({value: obj});
      return true;
    }catch(e){ console.error('push raw failed',e); return false; }
  }

  // 對外的同步入口：離線或寫入失敗時，把操作丟進 outbox 待同步佇列，之後自動重試。
  async function pushToFirestore(kind, obj){
    if(!navigator.onLine){
      await outboxAdd(kind, obj); await refreshPendingCount(); setSyncState('off'); return;
    }
    setSyncState('syncing');
    const ok = await pushToFirestoreRaw(kind, obj);
    if(ok){
      setSyncState('ok');
    } else {
      await outboxAdd(kind, obj); await refreshPendingCount(); setSyncState('error');
    }
  }

  async function saveMeta(newMeta){
    const stamped = {...newMeta, updatedAt: Date.now()};
    setMeta(stamped);
    const ok = await idbPut('meta',{key:'main', ...stamped});
    if(!ok){ setSyncState('error'); alert('儲存失敗，請重試一次'); return; }
    safeSet('meta', JSON.stringify(stamped));
    pushToFirestore('meta', stamped);
  }

  async function importBackup(data){
    const now = Date.now();
    const incomingRecords = (data.records||[]).map(r=>({...r, updatedAt: r.updatedAt||now, deleted: !!r.deleted}));
    const incomingIssues = (data.issues||[]).map(i=>({...i, updatedAt: i.updatedAt||now, deleted: !!i.deleted, followups: i.followups||[]}));

    const mergedRecords = mergeByUpdatedAt(records, incomingRecords);
    const mergedIssues = mergeByUpdatedAt(issues, incomingIssues);
    const baseMeta = data.meta ? {...data.meta, updatedAt: now} : meta;
    // 匯入完成後，重新用「全部紀錄」校正一次提醒設定，
    // 避免提醒日期停留在匯入前的舊資料（例如已經驗車/保養過卻還顯示逾期）。
    const mergedMeta = deriveMetaFromRecords(mergedRecords, baseMeta);

    let wroteOk = true;
    for(const r of mergedRecords){ if(!await idbPut('records', r)) wroteOk=false; }
    for(const i of mergedIssues){ if(!await idbPut('issues', i)) wroteOk=false; }
    if(!await idbPut('meta', {key:'main', ...mergedMeta})) wroteOk=false;
    safeSet('records', JSON.stringify(mergedRecords));
    safeSet('issues', JSON.stringify(mergedIssues));
    safeSet('meta', JSON.stringify(mergedMeta));

    setRecords(mergedRecords.slice().sort(byDateDesc));
    setIssues(mergedIssues.slice().sort(byDateDesc));
    setMeta(mergedMeta);
    if(!wroteOk) throw new Error('部分資料寫入本機失敗，請重試');

    for(const r of incomingRecords) await pushToFirestore('record', r);
    for(const i of incomingIssues) await pushToFirestore('issue', i);
    await pushToFirestore('meta', mergedMeta);
  }

  const savingRef = useRef(false);

  async function commitRecords(nextRecords, changedRec){
    // 每次紀錄變動（新增/編輯/刪除）都從「所有有效紀錄」重新推導提醒設定，
    // 不再用增量式 applyRecordToMeta，避免刪除或改類別後提醒殘留錯誤日期。
    const newMeta = deriveMetaFromRecords(nextRecords, meta);
    setRecords(nextRecords.slice().sort(byDateDesc));
    setMeta(newMeta);
    const okR = await idbPut('records', changedRec);
    const okM = await idbPut('meta', {key:'main', ...newMeta});
    await persistRecordsLocal();
    safeSet('meta', JSON.stringify(newMeta));
    if(!okR || !okM){ setSyncState('error'); alert('儲存失敗，請重試一次'); return false; }
    pushToFirestore('record', changedRec);
    pushToFirestore('meta', newMeta);
    return true;
  }

  async function handleSaveRecord(data){
    if(savingRef.current) return; // 防連點造成重複寫入
    savingRef.current = true;
    try{
      const now = Date.now();
      const full = {...data, id: data.id || uid(), updatedAt: now, deleted:false};
      const idx = records.findIndex(r=>r.id===full.id);
      const nextRecords = idx>=0 ? records.map(r=>r.id===full.id? full : r) : [full,...records];
      const ok = await commitRecords(nextRecords, full);
      if(ok){ setShowAdd(false); setEditingRecord(null); setAddPrefill(null); }
    } finally { savingRef.current = false; }
  }

  async function handleDeleteRecord(rec){
    if(savingRef.current) return;
    savingRef.current = true;
    try{
      const full = {...rec, deleted:true, updatedAt: Date.now()};
      const nextRecords = records.map(r=>r.id===full.id? full : r);
      const ok = await commitRecords(nextRecords, full);
      if(ok){ setShowAdd(false); setEditingRecord(null); setAddPrefill(null); }
    } finally { savingRef.current = false; }
  }

  async function handleSaveIssue(data){
    const now = Date.now();
    const full = {...data, id: uid(), status:'open', followups:[], createdAt:now, updatedAt:now, deleted:false};
    setIssues(prev=>[full,...prev].sort(byDateDesc));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
    setShowIssueAdd(false);
  }
  async function toggleIssueStatus(issue){
    const full = {...issue, status: issue.status==='open'?'resolved':'open', updatedAt: Date.now()};
    setIssues(prev=>prev.map(i=>i.id===full.id? full : i));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
  }
  async function handleAddFollowup(issue, data){
    const full = {...issue, followups:[...(issue.followups||[]), {...data, createdAt:Date.now()}], updatedAt: Date.now()};
    setIssues(prev=>prev.map(i=>i.id===full.id? full : i));
    await idbPut('issues', full);
    await persistIssuesLocal();
    pushToFirestore('issue', full);
    setFollowupTarget(null);
  }

  if(authLoading) return <>{showSplash && <SplashScreen phase={splashPhase}/>}</>;
  if(!user) return <>{showSplash && <SplashScreen phase={splashPhase}/>}<LoginScreen/></>;

  const addInitial = editingRecord || addPrefill;

  return <>
    {showSplash && <SplashScreen phase={splashPhase}/>}
    <div className="screen">
      {tab==='dashboard' && <Dashboard meta={meta} records={records} issues={issues} online={online} syncState={syncState} pendingCount={pendingCount}
        onQuickAdd={cat=>{ setEditingRecord(null); setAddPrefill({category:cat}); setShowAdd(true); }}
        onOpenAdd={()=>{ setEditingRecord(null); setAddPrefill(null); setShowAdd(true); }}
        onGoTab={setTab}/>}
      {tab==='timeline' && <Timeline records={records} onEdit={r=>{ setEditingRecord(r); setShowAdd(true); }}/>}
      {tab==='issues' && <IssuesScreen issues={issues}
        onAddIssue={()=>setShowIssueAdd(true)}
        onAddFollowup={i=>setFollowupTarget(i)}
        onToggleStatus={toggleIssueStatus}/>}
      {tab==='stats' && <StatsScreen records={records}/>}
      {tab==='settings' && <SettingsScreen meta={meta} onSaveMeta={saveMeta} onLogout={()=>auth.signOut()} records={records} issues={issues} onImport={importBackup}/>}
    </div>

    {tab!=='settings' && <button className="fab" onClick={()=>{ setEditingRecord(null); setAddPrefill(null); setShowAdd(true); }}>+</button>}

    <div className="tabbar">
      <div className="tabbar-row">
        <TabBtn icon="🏠" label="首頁" active={tab==='dashboard'} onClick={()=>setTab('dashboard')}/>
        <TabBtn icon="📜" label="紀錄" active={tab==='timeline'} onClick={()=>setTab('timeline')}/>
        <TabBtn icon="⚠️" label="事件" active={tab==='issues'} onClick={()=>setTab('issues')}/>
        <TabBtn icon="📊" label="統計" active={tab==='stats'} onClick={()=>setTab('stats')}/>
        <TabBtn icon="⚙️" label="設定" active={tab==='settings'} onClick={()=>setTab('settings')}/>
      </div>
      <div className="tabbar-brand">墨哥 OS</div>
    </div>

    {showAdd && <AddModal initial={addInitial} onSave={handleSaveRecord} onDelete={handleDeleteRecord}
      onClose={()=>{ setShowAdd(false); setEditingRecord(null); setAddPrefill(null); }}/>}
    {showIssueAdd && <IssueModal onSave={handleSaveIssue} onClose={()=>setShowIssueAdd(false)}/>}
    {followupTarget && <FollowupModal issue={followupTarget} onSave={data=>handleAddFollowup(followupTarget,data)} onClose={()=>setFollowupTarget(null)}/>}
  </>;
}

// iOS Safari 預設不會在 div/非 button 元素上觸發 :active 樣式，
// 除非頁面上有註冊 touchstart 監聽器。這行讓上面所有按下去的
// scale/opacity 回饋在 iPhone 上真的會出現。
// 錯誤保護畫面：任何 render 階段的例外（例如圖表庫載入失敗）都攔下來，
// 顯示可重試的提示，而不是整個 App 空白。
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = {hasError:false, msg:''}; }
  static getDerivedStateFromError(err){ return {hasError:true, msg: (err&&err.message)||'發生未預期的錯誤'}; }
  componentDidCatch(err, info){ console.error('App crashed:', err, info); }
  render(){
    if(this.state.hasError){
      return React.createElement('div', {className:'center-screen'},
        React.createElement('div', {className:'logo-splash'}, 'MOKO OS'),
        React.createElement('div', {style:{color:'var(--ink-dim)', fontSize:13, margin:'14px 0', textAlign:'center'}},
          '畫面載入時發生問題，你的資料仍安全保存在本機與雲端。'),
        React.createElement('button', {className:'btn btn-primary', style:{width:'100%',maxWidth:280},
          onClick:()=>location.reload()}, '重新載入')
      );
    }
    return this.props.children;
  }
}

document.addEventListener('touchstart', function(){}, {passive:true});

ReactDOM.render(
  React.createElement(ErrorBoundary, null, React.createElement(App)),
  document.getElementById('root')
);

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.error('SW register failed',e));
  });
}
</script>
</body>
</html>
